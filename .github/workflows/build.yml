name: Build and Release

permissions:
  contents: write
  id-token: write

on:
  push:
    branches:
      - feature
      - main
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_changed: ${{ steps.compare_versions.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version has changed
        id: compare_versions
        run: |
          CURRENT_VERSION="${{ steps.get_version.outputs.version }}"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

          if [ "$LATEST_TAG" = "none" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "First release: $CURRENT_VERSION"
          else
            LATEST_VERSION=${LATEST_TAG#v}
            if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Version unchanged: $CURRENT_VERSION"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Version bumped from $LATEST_VERSION to $CURRENT_VERSION"
            fi
          fi

  build:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            autopoint \
            bison \
            cmake \
            flex \
            gettext \
            gperf \
            libtool \
            make \
            pkg-config \
            python3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.4
          actions-cache-folder: emsdk-cache

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck TypeScript
        run: bun run typecheck

      - name: Build native dependencies
        run: make

      - name: Build WASM and TypeScript bundles
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: akarisub-dist
          path: |
            dist/

  publish:
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: akarisub-dist

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync JSR manifest version
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs'

          const pkg = JSON.parse(readFileSync('package.json', 'utf8'))
          const jsr = JSON.parse(readFileSync('jsr.json', 'utf8'))

          jsr.version = pkg.version

          writeFileSync('jsr.json', `${JSON.stringify(jsr, null, 2)}\n`)
          EOF

      - name: Publish to JSR
        run: deno publish --allow-dirty --no-check --sloppy-imports

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            ## akarisub v${{ needs.check-version.outputs.version }}

            ### Installation

            **npm / bun**
            ```bash
            npm install akarisub
            # or
            bun add akarisub
            ```

            **JSR (Deno)**
            ```bash
            deno add jsr:@altq/akarisub
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
